# 4X H100 Training Configuration
# Multi-GPU with 80GB VRAM

hardware:
  platform: "linux"
  accelerator: "cuda"
  gpu_memory_gb: 80
  num_gpus: 4
  multi_gpu: true

model:
  base_model: "Qwen/Qwen2.5-14B-Instruct"
  use_qlora: true
  quantization: "4bit"

training:
  batch_size: 16
  gradient_accumulation_steps: 4
  learning_rate: 1e-4
  num_epochs: 3
  max_length: 2048
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  warmup_ratio: 0.03
  weight_decay: 0.01


dataset:
  size: 100000
  split_ratio: 0.9
  problem_distribution:
    derivatives: 0.2
    integrals: 0.2
    limits: 0.2
    series: 0.2
    applications: 0.2
  difficulty_progression:
    basic: 0.25
    intermediate: 0.4
    advanced: 0.35

output:
  base_dir: "outputs/4x_h100"
  save_strategy: "epoch"
  logging_steps: 100

fine_tuning:
  num_iterations: 3
  learning_rate_decay: 0.5
  epochs_per_iteration: 2

evaluation:
  benchmark_path: "data/evaluation_benchmark.json"
  metrics:
    - accuracy
    - step_correctness
    - explanation_quality
