# RTX 5090 Training Configuration
# Consumer GPU with 24GB VRAM

hardware:
  platform: "linux"
  accelerator: "cuda"
  gpu_memory_gb: 24
  num_gpus: 1

model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  use_qlora: true
  quantization: "4bit"

training:
  batch_size: 16
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  num_epochs: 4
  max_length: 1024
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  warmup_ratio: 0.03
  weight_decay: 0.01

dataset:
  size: 20000
  split_ratio: 0.9
  problem_distribution:
    derivatives: 0.3
    integrals: 0.25
    limits: 0.2
    series: 0.15
    applications: 0.1
  difficulty_progression:
    basic: 0.5
    intermediate: 0.35
    advanced: 0.15

output:
  base_dir: "outputs/rtx_5090"
  save_strategy: "epoch"
  logging_steps: 50

fine_tuning:
  num_iterations: 3
  learning_rate_decay: 0.5
  epochs_per_iteration: 2

evaluation:
  benchmark_path: "data/evaluation_benchmark.json"
  metrics:
    - accuracy
    - step_correctness
    - explanation_quality
