# RTX PRO 6000 Training Configuration
# Single GPU with 48GB VRAM

hardware:
  platform: "linux"
  accelerator: "cuda"
  gpu_memory_gb: 48
  num_gpus: 1


model:
  base_model: "Qwen/Qwen2.5-3B-Instruct"
  use_qlora: true
  quantization: "4bit"

training:
  batch_size: 24
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  num_epochs: 4
  max_length: 1024
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  warmup_ratio: 0.03
  weight_decay: 0.01


dataset:
  size: 35000
  split_ratio: 0.9
  problem_distribution:
    derivatives: 0.25
    integrals: 0.25
    limits: 0.2
    series: 0.15
    applications: 0.15
  difficulty_progression:
    basic: 0.4
    intermediate: 0.4
    advanced: 0.2

output:
  base_dir: "outputs/rtx_pro_6000"
  save_strategy: "epoch"
  logging_steps: 100

fine_tuning:
  num_iterations: 3
  learning_rate_decay: 0.5
  epochs_per_iteration: 2

evaluation:
  benchmark_path: "data/evaluation_benchmark.json"
  metrics:
    - accuracy
    - step_correctness
    - explanation_quality
